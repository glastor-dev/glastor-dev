<svg width="450" height="195" viewBox="0 0 450 195" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="descId">
  <title id="titleId">glastor-dev's GitHub Stats</title>
  <desc id="descId">GitHub statistics for glastor-dev</desc>
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58a6ff; animation: fadeInAnimation 0.8s ease-in-out forwards; }
    .stat { font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #c9d1d9; }
    .stagger { opacity: 0; animation: fadeInAnimation 0.3s ease-in-out forwards; }
    .bold { font-weight: 700 }
    .icon { fill: #58a6ff; display: block; }
    
    @keyframes fadeInAnimation { from { opacity: 0; } to { opacity: 1; } }
    .bg { fill: #0d1117; stroke: #30363d; stroke-width: 1px; rx: 8px; }
  </style>

  <rect data-testid="card-bg" x="0.5" y="0.5" rx="8" height="194" stroke="#30363d" width="449" class="bg" />

  <g data-testid="card-title" transform="translate(25, 35)">
    <svg x="0" y="-13" viewBox="0 0 16 16" version="1.1" width="16" height="16">
      <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" fill="#58a6ff"/>
    </svg>
    <text x="25" y="0" class="header" data-testid="header">Estadísticas de @glastor-dev</text>
  </g>

  <g data-testid="main-card-body" transform="translate(0, 55)">
    <!-- Repositories -->
    <g transform="translate(25, 15)">
      <g class="stagger" style="animation-delay: 150ms">
        <text class="stat bold" x="0" y="12.5">📦 Repositorios Públicos:</text>
        <text class="stat" x="200" y="12.5" data-testid="stars">26</text>
      </g>
    </g>
    
    <!-- Seguidores -->
    <g transform="translate(25, 45)">
      <g class="stagger" style="animation-delay: 300ms">
        <text class="stat bold" x="0" y="12.5">👥 Seguidores:</text>
        <text class="stat" x="200" y="12.5" data-testid="commits">4</text>
      </g>
    </g>

    <!-- Estrellas -->
    <g transform="translate(25, 75)">
      <g class="stagger" style="animation-delay: 450ms">
        <text class="stat bold" x="0" y="12.5">⭐ Estrellas Recibidas:</text>
        <text class="stat" x="200" y="12.5" data-testid="prs">22</text>
      </g>
    </g>
    
    <!-- Forks -->
    <g transform="translate(25, 105)">
      <g class="stagger" style="animation-delay: 600ms">
        <text class="stat bold" x="0" y="12.5">🔄 Forks en Repos:</text>
        <text class="stat" x="200" y="12.5" data-testid="issues">0</text>
      </g>
    </g>
  </g>
</svg>
